  <style>
    :root{
      --bg:#05060d;
      --bg2:#0a0812;
      --panel:rgba(9,7,16,.74);
      --line:rgba(255,255,255,.08);
      --text:#f6f3ff;
      --muted:#b7b0cf;
      --purple:#8d67ff;
      --purple-soft:rgba(141,103,255,.22);
      --purple-strong:rgba(177,147,255,.28);
      --mx:50%;
      --my:50%;
      --scene-progress:0;
      --nav-h:76px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:'Inter',system-ui,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 18% 14%, rgba(124,76,255,.14), transparent 18%),
        radial-gradient(circle at 82% 24%, rgba(176,143,255,.09), transparent 16%),
        linear-gradient(180deg,#04050c,#05060b 32%,#06060c 100%);
      overflow-x:hidden;
    }
    body::before{
      content:'';
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:1;
      background:radial-gradient(220px circle at var(--mx) var(--my), rgba(167,139,250,.14), transparent 60%);
      mix-blend-mode:screen;
    }
    body::after{
      content:'';
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:1;
      opacity:.14;
      background-image:radial-gradient(rgba(255,255,255,.05) .6px, transparent .8px);
      background-size:16px 16px;
    }
    a{color:inherit}

    #loader{
      position:fixed;
      inset:0;
      z-index:120;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg,#05050b,#090712);
      transition:opacity .7s ease, visibility .7s ease;
    }
    #loader.hide{opacity:0;visibility:hidden}
    .loader-inner{display:flex;flex-direction:column;align-items:center;gap:18px}
    .loader-inner img{width:min(170px,28vw);filter:drop-shadow(0 0 28px rgba(145,103,255,.28))}
    .loader-bar{width:min(180px,44vw);height:3px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden}
    .loader-bar span{display:block;height:100%;width:44%;background:linear-gradient(90deg,#7b4cff,#c8b2ff);border-radius:inherit;animation:bar 1.2s ease-in-out infinite}
    .loader-copy{font-size:13px;letter-spacing:.34em;text-transform:uppercase;color:#d8cff8}
    @keyframes bar{0%{transform:translateX(-120%)}100%{transform:translateX(310%)}}

    .logo-home{
      position:fixed;
      top:18px;
      left:18px;
      z-index:90;
      width:64px;
      height:64px;
      display:grid;
      place-items:center;
      border-radius:22px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(9,7,16,.72);
      backdrop-filter:blur(14px);
      box-shadow:0 16px 50px rgba(0,0,0,.35), inset 0 0 0 1px rgba(255,255,255,.02);
      transition:transform .25s ease,border-color .25s ease,box-shadow .25s ease;
      text-decoration:none;
    }
    .logo-home:hover{transform:translateY(-2px);border-color:rgba(176,143,255,.34);box-shadow:0 18px 56px rgba(0,0,0,.42),0 0 28px rgba(140,97,255,.16)}
    .logo-home img{width:40px;height:40px;object-fit:contain}

    .nav{
      position:fixed;
      top:18px;
      right:18px;
      z-index:90;
      display:flex;
      gap:8px;
      align-items:center;
      padding:8px;
      border-radius:24px;
      background:rgba(9,7,16,.72);
      border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(14px);
      box-shadow:0 18px 60px rgba(0,0,0,.28);
    }
    .nav button,.nav a{
      appearance:none;
      border:0;
      background:none;
      color:#eee8ff;
      text-decoration:none;
      font-size:12px;
      letter-spacing:.18em;
      text-transform:uppercase;
      padding:12px 14px;
      border-radius:16px;
      position:relative;
      transition:color .2s ease,background .2s ease;
      cursor:pointer;
      font-family:inherit;
    }
    .nav button:hover,.nav a:hover,.nav button.active,.nav a.active{color:#fff;background:rgba(255,255,255,.06)}
    @media(max-width:900px){
      .nav{left:94px;right:14px;overflow:auto;justify-content:flex-start}
      .nav button,.nav a{white-space:nowrap;font-size:11px;padding:10px 12px}
      .logo-home{width:58px;height:58px}
    }

    main{position:relative;z-index:3}

    .intro-wrap{position:relative;height:400vh}
    .intro-stage{
      position:sticky;
      top:0;
      min-height:100svh;
      overflow:hidden;
      padding:104px 20px 28px;
      display:flex;
      align-items:stretch;
      justify-content:center;
    }
    .intro-shell{
      width:min(1240px,100%);
      min-height:calc(100svh - 132px);
      border-radius:34px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.07);
      box-shadow:0 35px 100px rgba(0,0,0,.35);
      background:linear-gradient(180deg, rgba(10,9,18,.58), rgba(7,7,13,.48));
      position:relative;
    }
    .intro-shell::before{
      content:'';
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 52%, rgba(124,76,255,.20), transparent 30%),
        radial-gradient(circle at 22% 22%, rgba(176,143,255,.12), transparent 18%),
        linear-gradient(180deg, rgba(255,255,255,.02), transparent 28%);
    }
    .scene{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      padding:34px;
      opacity:0;
      transform:translateY(40px) scale(.985);
      filter:blur(12px);
      transition:opacity .55s ease, transform .75s ease, filter .75s ease;
      pointer-events:none;
    }
    .scene.active{
      opacity:1;
      transform:translateY(0) scale(1);
      filter:blur(0);
      pointer-events:auto;
    }

    .hero-copy{text-align:center;max-width:920px;z-index:2}

    .hero-glow{
      position:absolute;

      aspect-ratio:1;
      border-radius:50%;
      background:radial-gradient(circle, rgba(124,76,255,.34) 0, rgba(124,76,255,.11) 40%, transparent 72%);

      animation:breathe 7s ease-in-out infinite;
      opacity:.94;
    }
    @keyframes breathe{0%,100%{transform:scale(.95);opacity:.86}50%{transform:scale(1.05);opacity:1}}

    .bg-wrap{text-align:center;position:relative;z-index:2;width:min(100%,920px)}
    .bg-reveal{
      position:relative;

      width:min(100%,850px);
      margin:0 auto;
      --rx:50%;
      --ry:50%;

    .bg-base{
      font-family:'DM Serif Display',serif;

      line-height:.82;
      letter-spacing:-.08em;
      margin:0;
      color:#f4f1fb;
      text-shadow:0 0 26px rgba(160,120,255,.14);
      transition:transform .35s ease, opacity .35s ease;
      user-select:none;
    }
    .bg-full{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      font-family:'DM Serif Display',serif;
      font-size:clamp(34px,6.2vw,88px);
      line-height:1;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:#d4c5ff;
      opacity:.95;
      -webkit-mask-image:radial-gradient(circle 150px at var(--rx) var(--ry), #000 0 45%, transparent 75%);
      mask-image:radial-gradient(circle 150px at var(--rx) var(--ry), #000 0 45%, transparent 75%);
      pointer-events:none;
    }
    .bg-logo{margin:16px auto 0;display:block;width:min(250px,45vw);filter:drop-shadow(0 0 26px rgba(104,154,255,.16));opacity:.96;animation:floaty 5.5s ease-in-out infinite}
    @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

    .links-scene{
      display:grid;
      align-content:center;
      gap:26px;
      width:min(100%,1200px);
    }
    .links-head h2{margin:0;font-family:'DM Serif Display',serif;font-size:clamp(48px,7vw,86px);font-weight:400;text-align:center}
    .links-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}
    .card{
      position:relative;
      overflow:hidden;
      min-height:225px;
      padding:22px 22px 18px;
      border-radius:28px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(8,8,14,.56);
      box-shadow:0 16px 40px rgba(0,0,0,.24);
      text-decoration:none;
      color:#fff;
      transition:transform .25s ease,border-color .25s ease, box-shadow .25s ease;
    }
    .card::before{
      content:'';
      position:absolute;
      width:160px;height:160px;border-radius:50%;
      left:calc(var(--tx,50%) - 80px);top:calc(var(--ty,50%) - 80px);
      background:radial-gradient(circle, rgba(172,141,255,.24), transparent 68%);
      opacity:0;transition:opacity .25s ease;pointer-events:none
    }
    .card:hover{transform:translateY(-4px);border-color:rgba(176,143,255,.34);box-shadow:0 24px 60px rgba(0,0,0,.34)}
    .card:hover::before{opacity:1}
    .icon{width:64px;height:64px;border-radius:20px;border:1px solid rgba(255,255,255,.08);display:grid;place-items:center;background:rgba(255,255,255,.03);margin-bottom:22px}
    .icon svg{width:30px;height:30px;display:block;color:#fff}
    .icon img{width:30px;height:30px;display:block;object-fit:contain;filter:grayscale(1) brightness(1.15)}
    .card h3{margin:0 0 10px;font-size:24px;letter-spacing:-.03em}
    .domain{color:#a59fb7;font-size:14px;line-height:1.4}
    .minor-line{margin-top:18px;height:1px;background:linear-gradient(90deg,rgba(255,255,255,.08),transparent)}

    .scene-progress{
      position:absolute;
      left:50%;
      bottom:22px;
      transform:translateX(-50%);
      display:flex;
      gap:10px;
      z-index:5;
    }
    .scene-progress span{
      width:46px;height:3px;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden;position:relative;
    }
    .scene-progress span::after{
      content:'';position:absolute;inset:0;background:linear-gradient(90deg,#7b4cff,#c8b2ff);transform:scaleX(0);transform-origin:left;transition:transform .35s ease;
    }
    .scene-progress span.active::after{transform:scaleX(1)}

    .gunduzler-gate{
      min-height:100svh;
      display:grid;
      place-items:center;
      padding:104px 20px 40px;
      position:relative;
      z-index:3;
    }
    .gate-card{
      width:min(1220px,100%);
      min-height:calc(100svh - 144px);
      border-radius:34px;
      border:1px solid rgba(255,255,255,.07);
      box-shadow:0 35px 100px rgba(0,0,0,.35);

      position:relative;
      display:grid;
      place-items:center;
      background:
        linear-gradient(180deg, rgba(4,4,9,.18), rgba(4,4,9,.64)),
        url('/assets/trade-duo.jpg') center/cover no-repeat;
    }
    .gate-card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 20% 72%, rgba(255,222,136,.12), transparent 18%),linear-gradient(180deg, rgba(0,0,0,.06), rgba(0,0,0,.44));pointer-events:none}
    .gate-copy{text-align:center;position:relative;z-index:2;max-width:860px;padding:24px}
    .gate-copy h2{margin:0 0 18px;font-family:'DM Serif Display',serif;font-size:clamp(56px,9vw,120px);line-height:.94;font-weight:400}
    .gate-copy p{margin:0 auto 28px;max-width:780px;font-size:clamp(18px,2vw,24px);line-height:1.7;color:#f0eadf}
    .gate-button{
      display:inline-flex;align-items:center;justify-content:center;gap:12px;
      text-decoration:none;color:#fff;padding:16px 22px;border-radius:999px;border:1px solid rgba(255,255,255,.10);
      background:rgba(10,10,16,.58);letter-spacing:.18em;text-transform:uppercase;font-size:12px;
      transition:transform .25s ease,border-color .25s ease,box-shadow .25s ease;
      box-shadow:0 18px 50px rgba(0,0,0,.28);
    }
    .gate-button:hover{transform:translateY(-2px);border-color:rgba(255,223,145,.34);box-shadow:0 22px 60px rgba(0,0,0,.35),0 0 20px rgba(255,223,145,.10)}
    .footer{text-align:center;color:#9a92b6;font-size:12px;letter-spacing:.16em;text-transform:uppercase;padding:0 20px 34px;position:relative;z-index:3}

    @media(max-width:1120px){.links-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media(max-width:720px){
      .intro-stage,.gunduzler-gate{padding:96px 14px 24px}
      .intro-shell,.gate-card{min-height:calc(100svh - 124px);border-radius:28px}
      .scene{padding:22px}
      .links-grid{grid-template-columns:1fr}
      .links-head h2{font-size:56px}
      .footer{font-size:10px;letter-spacing:.12em}
      .scene-progress span{width:32px}
    }
  </style>
</head>

  <script>
    const setMouse=e=>{
      const x=e.clientX/window.innerWidth*100;
      const y=e.clientY/window.innerHeight*100;
      document.body.style.setProperty('--mx',x+'%');
      document.body.style.setProperty('--my',y+'%');
    };
    window.addEventListener('pointermove',setMouse,{passive:true});

    const reveal=document.getElementById('bgReveal');
    if(reveal){
      reveal.addEventListener('pointermove',e=>{
        const r=reveal.getBoundingClientRect();
        const x=(e.clientX-r.left)/r.width*100;
        const y=(e.clientY-r.top)/r.height*100;
        reveal.style.setProperty('--rx',x+'%');
        reveal.style.setProperty('--ry',y+'%');
      });
    }

    document.querySelectorAll('.card').forEach(card=>{
      card.addEventListener('pointermove',e=>{
        const r=card.getBoundingClientRect();
        card.style.setProperty('--tx',(e.clientX-r.left)+'px');
        card.style.setProperty('--ty',(e.clientY-r.top)+'px');
      });
    });

    window.addEventListener('load',()=>{
      setTimeout(()=>document.getElementById('loader').classList.add('hide'),800);
    });

    const introWrap=document.getElementById('intro-wrap');
    const scenes=[...document.querySelectorAll('.scene[data-scene]')];
    const progressBars=[...document.querySelectorAll('.scene-progress span')];
    const sceneButtons=[...document.querySelectorAll('.nav button[data-scene]')];
    let activeScene=0;

    function setScene(index){
      const clamped=Math.max(0,Math.min(scenes.length-1,index));
      if(clamped===activeScene && scenes[clamped].classList.contains('active')) return;
      activeScene=clamped;
      scenes.forEach((scene,i)=>scene.classList.toggle('active',i===clamped));
      progressBars.forEach((bar,i)=>bar.classList.toggle('active',i===clamped));
      sceneButtons.forEach((btn,i)=>btn.classList.toggle('active',i===clamped));
    }

    function updateIntroByScroll(){
      const rect=introWrap.getBoundingClientRect();
      const total=Math.max(1, introWrap.offsetHeight-window.innerHeight);
      const progress=Math.min(.999,Math.max(0,(-rect.top)/total));
      const sceneIndex=Math.min(scenes.length-1,Math.floor(progress*scenes.length));
      setScene(sceneIndex);
    }

    sceneButtons.forEach(btn=>{
      btn.addEventListener('click',()=>{
        const index=Number(btn.dataset.scene || 0);
        const total=Math.max(1, introWrap.offsetHeight-window.innerHeight);
        const target=Math.round(total*(index/scenes.length));
        window.scrollTo({top:introWrap.offsetTop+target,behavior:'smooth'});
      });
    });

    window.addEventListener('scroll',updateIntroByScroll,{passive:true});
    window.addEventListener('resize',updateIntroByScroll);
    updateIntroByScroll();
  </script>
</body>
</html>
